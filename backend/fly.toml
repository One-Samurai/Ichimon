app = "ichimon"
primary_region = "nrt"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  DATA_SOURCE = "chain"
  SUI_GRPC_URL = "https://fullnode.testnet.sui.io:443"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/ready"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
